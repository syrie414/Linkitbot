name: Telegram Bot Runner

on:
  push:
    branches:
      - main 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install python-telegram-bot PyGitHub

      - name: Run Bot session
        env:
          # تأكد من مطابقة هذه الأسماء تماماً لما ستضعه في إعدادات GitHub
          TELEGRAM_TOKEN: ${{ secrets.TELE }}
          GITHUB_TOKEN: ${{ secrets.LINKIT }}
          CHAT_ID: ${{ secrets.MY_CHAT_ID }} 
          REPO_NAME: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          timeout 300s python bot_script.py || echo "Session ended."
